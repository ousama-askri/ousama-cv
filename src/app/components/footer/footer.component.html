<footer class="bg-gray-900 text-white py-12">
  <div class="section-container">
    <div class="flex flex-col md:flex-row justify-between items-center gap-6">
      
      <!-- Copyright -->
      <div class="text-center md:text-left">
        <p class="text-xl font-heading font-bold mb-2">{{ fullName() }}</p>
        <p class="text-gray-400 text-sm">
          © {{ currentYear }} Alle Rechte vorbehalten.
        </p>
      </div>

      <!-- Quick Links -->
      <nav class="flex flex-wrap justify-center gap-6">
        <a href="#about" class="text-gray-400 hover:text-primary-400 transition-colors text-sm">
          Über mich
        </a>
        <a href="#experience" class="text-gray-400 hover:text-primary-400 transition-colors text-sm">
          Erfahrung
        </a>
        <a href="#skills" class="text-gray-400 hover:text-primary-400 transition-colors text-sm">
          Kenntnisse
        </a>
        <a href="#contact" class="text-gray-400 hover:text-primary-400 transition-colors text-sm">
          Kontakt
        </a>
      </nav>

      <!-- Back to Top -->
      <button 
        type="button"
        (click)="scrollToTop()"
        class="w-10 h-10 bg-primary-500 rounded-lg flex items-center justify-center hover:bg-primary-400 transition-colors"
        aria-label="Zurück nach oben">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
        </svg>
      </button>
    </div>

    <!-- Bottom Bar -->
    <div class="mt-8 pt-8 border-t border-gray-800 text-center">
      <p class="text-gray-500 text-sm">
        Entwickelt mit 
        <span class="text-red-500">♥</span> 
        unter Verwendung von Angular und Tailwind CSS
      </p>
    </div>
  </div>
</footer>
